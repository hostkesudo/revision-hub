<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Downloads - Revision Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      Revision Hub
    </a>
    <ul class="navbar-nav" id="navbar-links"></ul>
    <div class="navbar-actions">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      <a href="/profile.html" class="btn btn-secondary btn-sm"><i class="fas fa-user"></i></a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header fade-in">
        <h1>My Downloads</h1>
        <p>Papers you've downloaded will appear here</p>
      </div>

      <div id="downloads-list">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Revision Hub. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/security.js"></script>
  <script>
    initTheme();
    requireAuth(async user => {
      initNavbar(user);

      const snap = await db.collection('downloads').where('uid', '==', user.uid).orderBy('date', 'desc').get();
      const container = document.getElementById('downloads-list');

      if (snap.empty) {
        container.innerHTML = '<div class="empty-state"><i class="fas fa-download"></i><h3>No downloads yet</h3><p>Start browsing papers and they\'ll appear here.</p><a href="/papers.html" class="btn btn-primary mt-2"><i class="fas fa-book"></i> Browse Papers</a></div>';
        return;
      }

      let html = '';
      snap.forEach(doc => {
        const d = doc.data();
        html += `
          <div class="download-item">
            <div class="download-icon"><i class="fas fa-file-pdf"></i></div>
            <div class="download-info">
              <h4>${d.title}</h4>
              <span><i class="fas fa-calendar"></i> ${formatDate(d.date)}</span>
            </div>
            <button class="btn btn-primary btn-sm" onclick="reDownload('${d.paperId}', '${d.title}')">
              <i class="fas fa-download"></i> Download
            </button>
          </div>
        `;
      });
      container.innerHTML = html;
    });

    async function reDownload(paperId, title) {
      try {
        const doc = await db.collection('papers').doc(paperId).get();
        if (doc.exists) {
          window.open(doc.data().fileURL, '_blank');
        } else {
          showToast('Paper no longer available.', 'error');
        }
      } catch (err) {
        showToast('Failed to download.', 'error');
      }
    }
  </script>
  <script src="js/security.js"></script>
</body>
</html>
