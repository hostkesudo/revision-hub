<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments - Revision Hub</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>Revision Hub</span>
      </a>
      <nav>
        <a href="/admin/dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/admin/upload.html"><i class="fas fa-cloud-upload-alt"></i> Upload Paper</a>
        <a href="/admin/papers.html"><i class="fas fa-book"></i> Manage Papers</a>
        <a href="/admin/students.html"><i class="fas fa-users"></i> Students</a>
        <a href="/admin/payments.html" class="active"><i class="fas fa-money-bill-wave"></i> Payments</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <div>
          <button class="sidebar-toggle" id="sidebar-toggle" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
          </button>
          <h1 style="font-size: 1.5rem; font-weight: 800;">Payments</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">View all payment transactions</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      </div>

      <div class="dash-grid" style="margin-bottom: 24px;">
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-money-bill-wave"></i></div>
          <div class="stat-value" id="today-revenue">-</div>
          <div class="stat-label">Today's Revenue</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-receipt"></i></div>
          <div class="stat-value" id="total-transactions">-</div>
          <div class="stat-label">Total Transactions</div>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Phone</th>
              <th>Type</th>
              <th>Amount</th>
              <th>Transaction Code</th>
              <th>Status</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="payments-table">
            <tr><td colspan="6"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/app.js"></script>
  <script>
    initTheme();
    requireAdmin(async () => {
      const snap = await db.collection('payments').orderBy('createdAt', 'desc').get();
      const tbody = document.getElementById('payments-table');

      let todayRevenue = 0;
      const today = new Date();
      today.setHours(0, 0, 0, 0);

      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="6" class="text-center" style="padding: 40px;">No payments yet.</td></tr>';
        document.getElementById('total-transactions').textContent = '0';
        document.getElementById('today-revenue').textContent = formatCurrency(0);
        return;
      }

      let html = '';
      let total = 0;
      snap.forEach(doc => {
        const p = doc.data();
        total++;
        if (p.status === 'completed') {
          const pDate = p.createdAt ? (p.createdAt.toDate ? p.createdAt.toDate() : new Date(p.createdAt)) : null;
          if (pDate && pDate >= today) todayRevenue += p.amount || 0;
        }
        html += `
          <tr>
            <td>${p.phone || '-'}</td>
            <td><span class="badge ${p.type === 'vip' ? 'badge-purple' : 'badge-info'}">${p.type === 'vip' ? 'VIP' : 'Paper'}</span></td>
            <td><strong>${formatCurrency(p.amount)}</strong></td>
            <td>${p.transactionCode || '-'}</td>
            <td><span class="badge ${p.status === 'completed' ? 'badge-success' : p.status === 'failed' ? 'badge-danger' : 'badge-warning'}">${p.status}</span></td>
            <td>${formatDateTime(p.createdAt)}</td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
      document.getElementById('total-transactions').textContent = total;
      document.getElementById('today-revenue').textContent = formatCurrency(todayRevenue);
    });
  </script>
</body>
</html>
