<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Students - Revision Hub</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>Revision Hub</span>
      </a>
      <nav>
        <a href="/admin/dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/admin/upload.html"><i class="fas fa-cloud-upload-alt"></i> Upload Paper</a>
        <a href="/admin/papers.html"><i class="fas fa-book"></i> Manage Papers</a>
        <a href="/admin/students.html" class="active"><i class="fas fa-users"></i> Students</a>
        <a href="/admin/payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <div>
          <button class="sidebar-toggle" id="sidebar-toggle" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
          </button>
          <h1 style="font-size: 1.5rem; font-weight: 800;">Students</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">View and manage registered students</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Phone</th>
              <th>VIP</th>
              <th>Joined</th>
            </tr>
          </thead>
          <tbody id="students-table">
            <tr><td colspan="5"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/security.js"></script>
  <script>
    initTheme();
    requireAdmin(async () => {
      const snap = await db.collection('users').where('role', '==', 'student').orderBy('createdAt', 'desc').get();
      const tbody = document.getElementById('students-table');

      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="5" class="text-center" style="padding: 40px;">No students registered yet.</td></tr>';
        return;
      }

      let html = '';
      snap.forEach(doc => {
        const s = doc.data();
        html += `
          <tr>
            <td><strong>${s.name || 'Unknown'}</strong></td>
            <td>${s.email || '-'}</td>
            <td>${s.phone || '-'}</td>
            <td><span class="badge ${s.vip ? 'badge-purple' : 'badge-warning'}">${s.vip ? 'Active' : 'No'}</span></td>
            <td>${formatDate(s.createdAt)}</td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    });
  </script>
  <script src="../js/security.js"></script>
</body>
</html>
