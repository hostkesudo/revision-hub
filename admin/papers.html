<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Papers - Revision Hub</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>Revision Hub</span>
      </a>
      <nav>
        <a href="/admin/dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/admin/upload.html"><i class="fas fa-cloud-upload-alt"></i> Upload Paper</a>
        <a href="/admin/papers.html" class="active"><i class="fas fa-book"></i> Manage Papers</a>
        <a href="/admin/students.html"><i class="fas fa-users"></i> Students</a>
        <a href="/admin/payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <div>
          <button class="sidebar-toggle" id="sidebar-toggle" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
          </button>
          <h1 style="font-size: 1.5rem; font-weight: 800;">Manage Papers</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">Edit, disable or delete papers</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      </div>

      <div class="filter-bar">
        <select id="filter-category" onchange="loadPapers()">
          <option value="">All Categories</option>
          <option value="revision">Revision</option>
          <option value="premium">Premium</option>
          <option value="notes">Notes</option>
          <option value="marking">Marking Scheme</option>
        </select>
        <select id="filter-level" onchange="loadPapers()">
          <option value="">All Levels</option>
          <option value="4">Level 4</option>
          <option value="5">Level 5</option>
          <option value="6">Level 6</option>
        </select>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Level</th>
              <th>Subject</th>
              <th>Price</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="papers-table">
            <tr><td colspan="7"><div class="page-loader"><div class="spinner"></div></div></td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/app.js"></script>
  <script>
    initTheme();
    requireAdmin(() => loadPapers());

    async function loadPapers() {
      const tbody = document.getElementById('papers-table');
      const category = document.getElementById('filter-category').value;
      const level = document.getElementById('filter-level').value;

      let query = db.collection('papers');
      if (category) query = query.where('category', '==', category);
      if (level) query = query.where('level', '==', level);

      const snap = await query.orderBy('uploadedAt', 'desc').get();

      if (snap.empty) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center" style="padding: 40px;">No papers found.</td></tr>';
        return;
      }

      let html = '';
      snap.forEach(doc => {
        const p = doc.data();
        html += `
          <tr>
            <td><strong>${p.title}</strong></td>
            <td><span class="badge badge-info">${p.category}</span></td>
            <td>Level ${p.level}</td>
            <td>${p.subject}</td>
            <td>${p.price > 0 ? formatCurrency(p.price) : '<span class="badge badge-success">Free</span>'}</td>
            <td><span class="badge ${p.enabled ? 'badge-success' : 'badge-danger'}">${p.enabled ? 'Active' : 'Disabled'}</span></td>
            <td>
              <div style="display: flex; gap: 6px;">
                <button class="btn btn-sm ${p.enabled ? 'btn-warning' : 'btn-success'}" onclick="togglePaper('${doc.id}', ${!p.enabled})">${p.enabled ? 'Disable' : 'Enable'}</button>
                <button class="btn btn-sm btn-danger" onclick="deletePaper('${doc.id}')"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>
        `;
      });
      tbody.innerHTML = html;
    }

    async function togglePaper(id, enabled) {
      await db.collection('papers').doc(id).update({ enabled });
      showToast(`Paper ${enabled ? 'enabled' : 'disabled'}.`, 'success');
      loadPapers();
    }

    async function deletePaper(id) {
      if (!confirm('Are you sure you want to delete this paper?')) return;
      await db.collection('papers').doc(id).delete();
      showToast('Paper deleted.', 'success');
      loadPapers();
    }
  </script>
</body>
</html>
