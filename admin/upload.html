<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upload Paper - Revision Hub</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="admin-sidebar">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>Revision Hub</span>
      </a>
      <nav>
        <a href="/admin/dashboard.html"><i class="fas fa-home"></i> Dashboard</a>
        <a href="/admin/upload.html" class="active"><i class="fas fa-cloud-upload-alt"></i> Upload Paper</a>
        <a href="/admin/papers.html"><i class="fas fa-book"></i> Manage Papers</a>
        <a href="/admin/students.html"><i class="fas fa-users"></i> Students</a>
        <a href="/admin/payments.html"><i class="fas fa-money-bill-wave"></i> Payments</a>
      </nav>
    </aside>

    <main class="admin-main">
      <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px;">
        <div>
          <button class="sidebar-toggle" id="sidebar-toggle" onclick="document.getElementById('admin-sidebar').classList.toggle('open')">
            <i class="fas fa-bars"></i>
          </button>
          <h1 style="font-size: 1.5rem; font-weight: 800;">Upload Paper</h1>
          <p style="color: var(--text-secondary); font-size: 0.9rem;">Add new revision or leakage papers</p>
        </div>
        <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      </div>

      <div class="card-solid" style="max-width: 640px;">
        <div id="alert-box"></div>

        <form id="upload-form" onsubmit="handleUpload(event)">
          <div class="form-group">
            <label>Type</label>
            <div style="display: flex; gap: 12px;">
              <label style="flex: 1; display: flex; align-items: center; gap: 10px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s;" class="type-option" data-value="revision">
                <input type="radio" name="type" value="revision" checked style="display: none;">
                <div class="stat-icon blue" style="width: 36px; height: 36px; font-size: 0.9rem;"><i class="fas fa-book"></i></div>
                <div>
                  <div style="font-weight: 700; font-size: 0.95rem;">Revision</div>
                  <div style="font-size: 0.8rem; color: var(--text-secondary);">Free access</div>
                </div>
              </label>
              <label style="flex: 1; display: flex; align-items: center; gap: 10px; padding: 14px 16px; border: 2px solid var(--border); border-radius: 12px; cursor: pointer; transition: all 0.2s;" class="type-option" data-value="premium">
                <input type="radio" name="type" value="premium" style="display: none;">
                <div class="stat-icon yellow" style="width: 36px; height: 36px; font-size: 0.9rem;"><i class="fas fa-star"></i></div>
                <div>
                  <div style="font-weight: 700; font-size: 0.95rem;">Leakages</div>
                  <div style="font-size: 0.8rem; color: var(--text-secondary);">Paid access</div>
                </div>
              </label>
            </div>
          </div>

          <div class="form-group">
            <label>Upload File</label>
            <input type="file" id="file" class="form-control" accept=".pdf,.docx,.doc,.png,.jpg,.jpeg" multiple required style="padding: 10px;">
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="upload-btn">
            <span id="upload-text"><i class="fas fa-cloud-upload-alt"></i> Upload</span>
            <div class="spinner hidden" id="upload-spinner"></div>
          </button>
        </form>
      </div>
    </main>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/app.js"></script>
  <script>
    initTheme();
    requireAdmin(() => {});

    document.querySelectorAll('.type-option').forEach(opt => {
      opt.addEventListener('click', () => {
        document.querySelectorAll('.type-option').forEach(o => {
          o.style.borderColor = 'var(--border)';
          o.style.background = 'transparent';
        });
        opt.style.borderColor = 'var(--primary)';
        opt.style.background = 'rgba(79, 70, 229, 0.05)';
        opt.querySelector('input').checked = true;
      });
    });
    document.querySelector('.type-option[data-value="revision"]').click();

    async function handleUpload(e) {
      e.preventDefault();
      const btn = document.getElementById('upload-btn');
      const text = document.getElementById('upload-text');
      const spinner = document.getElementById('upload-spinner');
      const alertBox = document.getElementById('alert-box');
      const fileInput = document.getElementById('file');

      if (!fileInput.files.length) {
        alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Please select files.</div>';
        return;
      }

      btn.disabled = true;
      text.classList.add('hidden');
      spinner.classList.remove('hidden');
      alertBox.innerHTML = '';

      try {
        const config = await getAppConfig();
        const fileServerUrl = config.fileServerUrl;
        const uploadToken = config.uploadToken;
        const category = document.querySelector('input[name="type"]:checked').value;
        const files = Array.from(fileInput.files);
        let uploaded = 0;

        for (const file of files) {
          const formData = new FormData();
          formData.append('file', file);

          const res = await fetch(`${fileServerUrl}/upload`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${uploadToken}` },
            body: formData
          });

          if (!res.ok) throw new Error(`Failed to upload ${file.name}`);
          const { url } = await res.json();
          const title = file.name.replace(/\.[^.]+$/, '').replace(/[_-]/g, ' ');

          await db.collection('papers').add({
            title, category, level: '4', subject: 'General', month: 'July/August 2026',
            price: category === 'premium' ? 20 : 0,
            fileURL: url, enabled: true,
            uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
          });
          uploaded++;
        }

        alertBox.innerHTML = `<div class="alert alert-success"><i class="fas fa-check-circle"></i> ${uploaded} file(s) uploaded successfully!</div>`;
        document.getElementById('upload-form').reset();
        document.querySelector('.type-option[data-value="revision"]').click();
      } catch (err) {
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Upload failed: ${err.message}</div>`;
      } finally {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }
  <script src="../js/security.js"></script>
</body>
</html>
