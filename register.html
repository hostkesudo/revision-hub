<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Revision Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>Revision Hub</span>
      </a>
      <h1>Create Account</h1>
      <p class="subtitle">Join thousands of students preparing smarter</p>

      <div id="alert-box"></div>

      <form id="register-form" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" class="form-control" placeholder="0712345678" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required minlength="6">
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" class="form-control" placeholder="Re-enter password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn">
          <span id="register-text">Create Account</span>
          <div class="spinner hidden" id="register-spinner"></div>
        </button>
      </form>

      <p class="auth-footer">
        Already have an account? <a href="/login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/security.js"></script>
  <script>
    initTheme();
    redirectIfAuth();

    async function handleRegister(e) {
      e.preventDefault();
      const btn = document.getElementById('register-btn');
      const text = document.getElementById('register-text');
      const spinner = document.getElementById('register-spinner');
      const alertBox = document.getElementById('alert-box');

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (password !== confirm) {
        alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Passwords do not match.</div>';
        return;
      }

      btn.disabled = true;
      text.classList.add('hidden');
      spinner.classList.remove('hidden');
      alertBox.innerHTML = '';

      try {
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const phone = document.getElementById('phone').value.trim();

        const cred = await auth.createUserWithEmailAndPassword(email, password);
        await cred.user.updateProfile({ displayName: name });

        await db.collection('users').doc(cred.user.uid).set({
          name: name,
          email: email,
          phone: phone,
          vip: false,
          vipExpiry: null,
          role: 'student',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        window.location.href = '/vip.html';
      } catch (err) {
        let msg = 'Registration failed. Please try again.';
        if (err.code === 'auth/email-already-in-use') msg = 'An account with this email already exists.';
        if (err.code === 'auth/weak-password') msg = 'Password is too weak. Use at least 6 characters.';
        if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${msg}</div>`;
      } finally {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }
  </script>
  <script src="js/security.js"></script>
</body>
</html>
