<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Revision Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>Revision Hub</span>
      </a>
      <h1>Welcome Back</h1>
      <p class="subtitle">Sign in to continue your revision</p>

      <div id="alert-box"></div>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" class="form-control" placeholder="Enter your password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">
          <span id="login-text">Sign In</span>
          <div class="spinner hidden" id="login-spinner"></div>
        </button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </p>
      <p class="auth-footer mt-1">
        <a href="/forgot.html">Forgot password?</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/security.js"></script>
  <script>
    initTheme();
    redirectIfAuth();

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('login-btn');
      const text = document.getElementById('login-text');
      const spinner = document.getElementById('login-spinner');
      const alertBox = document.getElementById('alert-box');

      btn.disabled = true;
      text.classList.add('hidden');
      spinner.classList.remove('hidden');
      alertBox.innerHTML = '';

      try {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        const cred = await auth.signInWithEmailAndPassword(email, password);

        const doc = await db.collection('users').doc(cred.user.uid).get();
        if (doc.exists && doc.data().role === 'admin') {
          window.location.href = '/admin/dashboard.html';
        } else {
          window.location.href = '/vip.html';
        }
      } catch (err) {
        let msg = 'Login failed. Please try again.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        if (err.code === 'auth/wrong-password') msg = 'Incorrect password.';
        if (err.code === 'auth/invalid-email') msg = 'Invalid email address.';
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${msg}</div>`;
      } finally {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }
  </script>
  <script src="js/security.js"></script>
</body>
</html>
