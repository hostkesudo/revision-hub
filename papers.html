<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Papers - CDACC LEAKAGES</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      CDACC LEAKAGES
    </a>
    <ul class="navbar-nav" id="navbar-links"></ul>
    <div class="navbar-actions">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      <a href="/profile.html" class="btn btn-secondary btn-sm"><i class="fas fa-user"></i></a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header fade-in">
        <h1>Revision Papers</h1>
        <p>Browse free revision papers by level and subject</p>
      </div>

      <div class="filter-bar fade-in">
        <select id="filter-level" onchange="loadPapers()">
          <option value="">All Levels</option>
          <option value="4">Level 4</option>
          <option value="5">Level 5</option>
          <option value="6">Level 6</option>
        </select>
        <select id="filter-month" onchange="loadPapers()">
          <option value="">All Months</option>
          <option value="July/August 2026">July/August 2026</option>
          <option value="Nov/Dec 2026">Nov/Dec 2026</option>
        </select>
        <select id="filter-subject" onchange="loadPapers()">
          <option value="">All Subjects</option>
        </select>
      </div>

      <div class="cards-grid" id="papers-grid">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 CDACC LEAKAGES. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/security.js"></script>
  <script>
    initTheme();
    let currentUser = null;
    let allPapers = [];

    requireAuth(user => {
      currentUser = user;
      initNavbar(user);
      loadPapers();
    });

    async function loadPapers() {
      const grid = document.getElementById('papers-grid');
      const level = document.getElementById('filter-level').value;
      const month = document.getElementById('filter-month').value;

      let query = db.collection('papers')
        .where('category', '==', 'revision')
        .where('enabled', '==', true);

      if (level) query = query.where('level', '==', level);

      const snap = await query.orderBy('uploadedAt', 'desc').get();
      allPapers = [];
      const subjects = new Set();

      snap.forEach(doc => {
        const p = { id: doc.id, ...doc.data() };
        if (month && p.month !== month) return;
        subjects.add(p.subject);
        allPapers.push(p);
      });

      const subjectFilter = document.getElementById('filter-subject');
      const currentSubject = subjectFilter.value;
      subjectFilter.innerHTML = '<option value="">All Subjects</option>';
      [...subjects].sort().forEach(s => {
        subjectFilter.innerHTML += `<option value="${s}" ${s === currentSubject ? 'selected' : ''}>${s}</option>`;
      });

      const subject = subjectFilter.value;
      const filtered = subject ? allPapers.filter(p => p.subject === subject) : allPapers;

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-book-open"></i><h3>No papers found</h3><p>Try adjusting your filters or check back later.</p></div>';
        return;
      }

      let html = '';
      filtered.forEach(p => {
        html += `
          <div class="paper-card">
            <div class="paper-card-header">
              <div class="paper-card-icon"><i class="fas fa-file-pdf"></i></div>
              <span class="paper-card-price price-free">Free</span>
            </div>
            <div class="paper-card-body">
              <h3>${p.title}</h3>
              <div class="paper-card-meta">
                <span><i class="fas fa-layer-group"></i> Level ${p.level}</span>
                <span><i class="fas fa-book"></i> ${p.subject}</span>
                <span><i class="fas fa-calendar"></i> ${p.month}</span>
              </div>
            </div>
            <div class="paper-card-footer">
              <button class="btn btn-primary btn-sm" style="flex:1;" onclick="downloadPaper('${p.id}', '${p.fileURL}', '${p.title}')">
                <i class="fas fa-download"></i> Download
              </button>
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    async function downloadPaper(id, url, title) {
      try {
        await db.collection('downloads').add({
          uid: currentUser.uid,
          paperId: id,
          title: title,
          date: firebase.firestore.FieldValue.serverTimestamp()
        });
        window.open(url, '_blank');
        showToast('Download started!', 'success');
      } catch (err) {
        showToast('Download failed. Try again.', 'error');
      }
    }
  </script>
  <script src="js/security.js"></script>
</body>
</html>
