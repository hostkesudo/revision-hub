<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password - CDACC LEAKAGES</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card fade-in">
      <a href="/" class="brand">
        <div class="logo-icon"><i class="fas fa-book-open"></i></div>
        <span>CDACC LEAKAGES</span>
      </a>
      <h1>Reset Password</h1>
      <p class="subtitle">Enter your email and we'll send you a reset link</p>

      <div id="alert-box"></div>

      <form id="reset-form" onsubmit="handleReset(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="reset-btn">
          <span id="reset-text">Send Reset Link</span>
          <div class="spinner hidden" id="reset-spinner"></div>
        </button>
      </form>

      <p class="auth-footer">
        Remember your password? <a href="/login.html">Sign in</a>
      </p>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/security.js"></script>
  <script>
    initTheme();

    async function handleReset(e) {
      e.preventDefault();
      const btn = document.getElementById('reset-btn');
      const text = document.getElementById('reset-text');
      const spinner = document.getElementById('reset-spinner');
      const alertBox = document.getElementById('alert-box');

      btn.disabled = true;
      text.classList.add('hidden');
      spinner.classList.remove('hidden');

      try {
        const email = document.getElementById('email').value.trim();
        await auth.sendPasswordResetEmail(email);
        alertBox.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Reset link sent! Check your email.</div>';
      } catch (err) {
        let msg = 'Failed to send reset link.';
        if (err.code === 'auth/user-not-found') msg = 'No account found with this email.';
        alertBox.innerHTML = `<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> ${msg}</div>`;
      } finally {
        btn.disabled = false;
        text.classList.remove('hidden');
        spinner.classList.add('hidden');
      }
    }
  </script>
  <script src="js/security.js"></script>
</body>
</html>
