<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Revision Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      Revision Hub
    </a>
    <ul class="navbar-nav" id="navbar-links"></ul>
    <div class="navbar-actions">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container-sm">
      <div class="page-header fade-in">
        <h1>My Profile</h1>
        <p>Manage your account settings</p>
      </div>

      <div class="card-solid fade-in" style="margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
          <div style="width: 64px; height: 64px; border-radius: 50%; background: linear-gradient(135deg, var(--primary), var(--accent)); display: flex; align-items: center; justify-content: center; color: #fff; font-size: 1.5rem; font-weight: 800;" id="avatar">?</div>
          <div>
            <h2 style="font-size: 1.2rem; font-weight: 800; margin-bottom: 2px;" id="display-name">-</h2>
            <p style="font-size: 0.85rem; color: var(--text-muted);" id="display-email">-</p>
          </div>
        </div>

        <div id="alert-box"></div>

        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="name" class="form-control">
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="email" class="form-control" disabled style="opacity: 0.6;">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" class="form-control">
        </div>

        <div style="display: flex; gap: 12px; margin-bottom: 16px;">
          <div style="flex:1;">
            <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; display: block;">VIP Status</label>
            <span class="badge badge-purple" id="vip-badge">-</span>
          </div>
          <div style="flex:1;">
            <label style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 4px; display: block;">Member Since</label>
            <span style="font-size: 0.85rem; font-weight: 600;" id="member-since">-</span>
          </div>
        </div>

        <button class="btn btn-primary btn-block" id="save-btn" onclick="saveProfile()">
          <i class="fas fa-save"></i> Save Changes
        </button>
      </div>

      <div class="card-solid fade-in" style="margin-bottom: 20px;">
        <h3 style="font-size: 1rem; font-weight: 700; margin-bottom: 16px;"><i class="fas fa-lock"></i> Change Password</h3>
        <div class="form-group">
          <label>New Password</label>
          <input type="password" id="new-password" class="form-control" placeholder="Min 6 characters" minlength="6">
        </div>
        <button class="btn btn-secondary btn-block" onclick="changePassword()">
          <i class="fas fa-key"></i> Update Password
        </button>
      </div>

      <button class="btn btn-danger btn-block fade-in" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i> Logout
      </button>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Revision Hub. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script src="js/security.js"></script>
  <script>
    initTheme();
    let userData = null;

    requireAuth(async user => {
      initNavbar(user);

      const doc = await db.collection('users').doc(user.uid).get();
      userData = doc.data();

      document.getElementById('display-name').textContent = userData.name || user.displayName || 'Student';
      document.getElementById('display-email').textContent = user.email;
      document.getElementById('avatar').textContent = (userData.name || 'S')[0].toUpperCase();
      document.getElementById('name').value = userData.name || '';
      document.getElementById('email').value = user.email || '';
      document.getElementById('phone').value = userData.phone || '';

      const vipBadge = document.getElementById('vip-badge');
      if (userData.vip) {
        vipBadge.textContent = 'Active';
        vipBadge.className = 'badge badge-purple';
      } else {
        vipBadge.textContent = 'Inactive';
        vipBadge.className = 'badge badge-warning';
      }

      document.getElementById('member-since').textContent = formatDate(userData.createdAt);
    });

    async function saveProfile() {
      const btn = document.getElementById('save-btn');
      const alertBox = document.getElementById('alert-box');
      btn.disabled = true;

      try {
        const user = auth.currentUser;
        const name = document.getElementById('name').value.trim();
        const phone = document.getElementById('phone').value.trim();

        await db.collection('users').doc(user.uid).update({ name, phone });
        await user.updateProfile({ displayName: name });

        alertBox.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Profile updated!</div>';
        document.getElementById('display-name').textContent = name;
        document.getElementById('avatar').textContent = (name || 'S')[0].toUpperCase();
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Failed to update profile.</div>';
      }

      btn.disabled = false;
      setTimeout(() => alertBox.innerHTML = '', 3000);
    }

    async function changePassword() {
      const newPass = document.getElementById('new-password').value;
      const alertBox = document.getElementById('alert-box');

      if (!newPass || newPass.length < 6) {
        alertBox.innerHTML = '<div class="alert alert-warning"><i class="fas fa-exclamation-circle"></i> Password must be at least 6 characters.</div>';
        return;
      }

      try {
        await auth.currentUser.updatePassword(newPass);
        alertBox.innerHTML = '<div class="alert alert-success"><i class="fas fa-check-circle"></i> Password updated!</div>';
        document.getElementById('new-password').value = '';
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-danger"><i class="fas fa-exclamation-circle"></i> Error updating password. You may need to re-login first.</div>';
      }

      setTimeout(() => alertBox.innerHTML = '', 3000);
    }

    async function handleLogout() {
      await auth.signOut();
      window.location.href = '/';
    }
  </script>
  <script src="js/security.js"></script>
</body>
</html>
