<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Papers - Revision Hub</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
  <nav class="navbar">
    <a href="/" class="navbar-brand">
      <div class="logo-icon"><i class="fas fa-book-open"></i></div>
      Revision Hub
    </a>
    <ul class="navbar-nav" id="navbar-links"></ul>
    <div class="navbar-actions">
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      <a href="/profile.html" class="btn btn-secondary btn-sm"><i class="fas fa-user"></i></a>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header fade-in">
        <h1>Premium Papers</h1>
        <p>Unlock premium predicted papers and exclusive study resources</p>
      </div>

      <div id="vip-notice" class="hidden mb-3">
        <div class="alert alert-info">
          <i class="fas fa-crown"></i> You're a VIP member! All premium papers are unlocked for you.
        </div>
      </div>

      <div class="filter-bar fade-in">
        <select id="filter-level" onchange="loadPapers()">
          <option value="">All Levels</option>
          <option value="4">Level 4</option>
          <option value="5">Level 5</option>
          <option value="6">Level 6</option>
        </select>
        <select id="filter-month" onchange="loadPapers()">
          <option value="">All Months</option>
          <option value="July/August 2026">July/August 2026</option>
          <option value="Nov/Dec 2026">Nov/Dec 2026</option>
        </select>
        <select id="filter-subject" onchange="loadPapers()">
          <option value="">All Subjects</option>
        </select>
      </div>

      <div class="cards-grid" id="papers-grid">
        <div class="page-loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="pay-modal">
    <div class="modal">
      <button class="modal-close" onclick="closeModal()"><i class="fas fa-times"></i></button>
      <h2>Unlock Premium Paper</h2>
      <p id="pay-paper-title"></p>
      <div style="text-align: center; margin-bottom: 20px;">
        <div style="font-size: 2.5rem; font-weight: 900; color: var(--primary);">KES 20</div>
        <div style="font-size: 0.85rem; color: var(--text-muted);">One-time payment</div>
      </div>
      <div class="form-group">
        <label>M-Pesa Phone Number</label>
        <input type="tel" id="pay-phone" class="form-control" placeholder="0712345678" required>
      </div>
      <button class="btn btn-success btn-block" id="pay-btn" onclick="processPayment()">
        <i class="fas fa-mobile-alt"></i> Pay with M-Pesa
      </button>
      <div id="pay-status" class="mt-2 text-center" style="font-size: 0.85rem; color: var(--text-muted);"></div>
    </div>
  </div>

  <footer class="footer">
    <p>&copy; 2026 Revision Hub. All rights reserved.</p>
  </footer>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
  <script>
    initTheme();
    let currentUser = null;
    let isVip = false;
    let selectedPaperId = null;
    let purchasedPapers = [];

    requireAuth(async user => {
      currentUser = user;
      initNavbar(user);

      const userDoc = await db.collection('users').doc(user.uid).get();
      const userData = userDoc.data();
      isVip = userData && userData.vip;

      if (isVip) {
        document.getElementById('vip-notice').classList.remove('hidden');
      }

      const paymentsSnap = await db.collection('payments').where('uid', '==', user.uid).where('status', '==', 'completed').get();
      paymentsSnap.forEach(doc => {
        const p = doc.data();
        if (p.paperId) purchasedPapers.push(p.paperId);
      });

      loadPapers();
    });

    async function loadPapers() {
      const grid = document.getElementById('papers-grid');
      const level = document.getElementById('filter-level').value;
      const month = document.getElementById('filter-month').value;

      let query = db.collection('papers')
        .where('category', '==', 'premium')
        .where('enabled', '==', true);

      if (level) query = query.where('level', '==', level);

      const snap = await query.orderBy('uploadedAt', 'desc').get();
      const papers = [];
      const subjects = new Set();

      snap.forEach(doc => {
        const p = { id: doc.id, ...doc.data() };
        if (month && p.month !== month) return;
        subjects.add(p.subject);
        papers.push(p);
      });

      const subjectFilter = document.getElementById('filter-subject');
      const currentSubject = subjectFilter.value;
      subjectFilter.innerHTML = '<option value="">All Subjects</option>';
      [...subjects].sort().forEach(s => {
        subjectFilter.innerHTML += `<option value="${s}" ${s === currentSubject ? 'selected' : ''}>${s}</option>`;
      });

      const subject = subjectFilter.value;
      const filtered = subject ? papers.filter(p => p.subject === subject) : papers;

      if (filtered.length === 0) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-star"></i><h3>No premium papers yet</h3><p>Check back soon for new premium content.</p></div>';
        return;
      }

      let html = '';
      filtered.forEach(p => {
        const owned = isVip || purchasedPapers.includes(p.id);
        html += `
          <div class="paper-card">
            <div class="paper-card-header">
              <div class="paper-card-icon" style="background: rgba(245, 158, 11, 0.1); color: var(--warning);"><i class="fas fa-star"></i></div>
              <span class="paper-card-price price-paid">KES ${p.price || 20}</span>
            </div>
            <div class="paper-card-body">
              <h3>${p.title}</h3>
              <div class="paper-card-meta">
                <span><i class="fas fa-layer-group"></i> Level ${p.level}</span>
                <span><i class="fas fa-book"></i> ${p.subject}</span>
                <span><i class="fas fa-calendar"></i> ${p.month}</span>
              </div>
            </div>
            <div class="paper-card-footer">
              ${owned
                ? `<button class="btn btn-success btn-sm" style="flex:1;" onclick="window.open('${p.fileURL}', '_blank')"><i class="fas fa-download"></i> Download</button>`
                : `<button class="btn btn-warning btn-sm" style="flex:1;" onclick="openPayModal('${p.id}', '${p.title}')"><i class="fas fa-lock"></i> Unlock - KES ${p.price || 20}</button>`
              }
            </div>
          </div>
        `;
      });
      grid.innerHTML = html;
    }

    function openPayModal(paperId, title) {
      selectedPaperId = paperId;
      document.getElementById('pay-paper-title').textContent = title;
      document.getElementById('pay-modal').classList.add('active');
    }

    function closeModal() {
      document.getElementById('pay-modal').classList.remove('active');
      selectedPaperId = null;
    }

    const WORKER_URL = 'https://revisionhub-payhero-proxy.YOUR_SUBDOMAIN.workers.dev';

    async function processPayment() {
      const phone = document.getElementById('pay-phone').value.trim();
      const btn = document.getElementById('pay-btn');
      const status = document.getElementById('pay-status');

      if (!phone || phone.length < 10) {
        showToast('Enter a valid phone number', 'error');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div> Sending STK Push...';
      status.textContent = 'Check your phone for the M-Pesa prompt...';

      try {
        const ref = `RH-${Date.now()}`;

        const payDoc = await db.collection('payments').add({
          uid: currentUser.uid,
          paperId: selectedPaperId,
          type: 'paper',
          amount: 20,
          phone: phone,
          externalReference: ref,
          status: 'pending',
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        await db.collection('payments').doc(payDoc.id).update({ externalReference: ref });

        const response = await fetch(WORKER_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            amount: 20,
            phone_number: phone,
            external_reference: ref,
            customer_name: currentUser.displayName || 'Student'
          })
        });

        const result = await response.json();

        if (response.ok) {
          status.textContent = 'STK Push sent! Enter your M-Pesa PIN on your phone...';
          listenForPayment(ref, selectedPaperId);
        } else {
          status.textContent = result.error || result.message || 'Payment failed. Try again.';
          btn.disabled = false;
          btn.innerHTML = '<i class="fas fa-mobile-alt"></i> Pay with M-Pesa';
        }
      } catch (err) {
        status.textContent = 'Error. Check your connection and try again.';
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-mobile-alt"></i> Pay with M-Pesa';
      }
    }

    function listenForPayment(ref, paperId) {
      const btn = document.getElementById('pay-btn');
      const status = document.getElementById('pay-status');

      const checkInterval = setInterval(async () => {
        try {
          const response = await fetch(`${WORKER_URL}/verify-payment`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ reference: ref })
          });
          const result = await response.json();
          const s = (result.status || '').toLowerCase();

          if (s === 'success' || s === 'completed') {
            clearInterval(checkInterval);
            purchasedPapers.push(paperId);
            closeModal();
            showToast('Payment successful! Paper unlocked.', 'success');
            loadPapers();
          } else if (s === 'failed' || s === 'rejected') {
            clearInterval(checkInterval);
            status.textContent = 'Payment failed or cancelled.';
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-mobile-alt"></i> Pay with M-Pesa';
          }
        } catch (err) { }
      }, 3000);

      setTimeout(() => clearInterval(checkInterval), 120000);
    }
  </script>
</body>
</html>
